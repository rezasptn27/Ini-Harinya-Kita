<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Satu Tahun Kita</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px 30px;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeIn 2s ease;
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0;
      animation: textFade 2s ease forwards;
      animation-delay: 1s;
    }

    button {
      margin-top: 25px;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      background: #fff;
      color: #ee9ca7;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    audio {
      display: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes textFade {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Untuk Kamu 🤍</h1>
    <p>
      Satu tahun bukan soal berapa lama,<br>
      tapi tentang siapa yang berjalan bersama.<br><br>
      Ini bukan sekadar suara,<br>
      tapi perasaan yang akhirnya berani bicara.
    </p>

    <button onclick="playAudio()">Putar Suara Hati</button>

    <audio id="audio">
      <source src="vn.mp3" type="audio/mpeg">
    </audio>
  </div>

  <script>
    function playAudio() {
      document.getElementById("audio").play();
    }
  </script>

</body>
</html>
