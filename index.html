<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Satu Tahun Kebersamaan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      font-family: 'Segoe UI', sans-serif;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: rgba(0,0,0,0.25);
      padding: 30px;
      border-radius: 20px;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    button {
      background: white;
      color: #ff5f8a;
      border: none;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: #ffe3ec;
    }

    .playing {
      background: #ffd1dc !important;
      color: #b3004b !important;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>💖 Satu Tahun Kebersamaan</h1>
    <p>
      Dari hal receh yang bahkan kita gak rencanain,  
      sampai perjalanan jauh yang pertama kali aku tempuh sendirian.  
      <br><br>
      Terima kasih sudah jadi bagian dari cerita yang ingin terus aku tulis.
    </p>

    <button id="playBtn" onclick="playAudio()">Putar Suara Hati 🎧</button>

    <audio id="audio">
      <source src="anniv.mp3" type="audio/mpeg">
      Browser kamu tidak mendukung audio.
    </audio>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const button = document.getElementById("playBtn");

    function playAudio() {
      audio.play();
      button.innerText = "Sedang Diputar 💕";
      button.classList.add("playing");
    }
  </script>

</body>
</html>
